<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Colour Your Life · 勇闖五個世界</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;background:linear-gradient(135deg,#1a1a2e,#2d1b69,#16213e);min-height:100vh;color:#e0e0e0}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#loginScreen .logo{text-align:center;margin-bottom:30px}
#loginScreen .logo h1{font-size:1.5rem;color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,0.3)}
#loginScreen .logo p{font-size:0.9rem;color:#8899aa;margin-top:4px}
.login-box{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px 28px;width:100%;max-width:380px}
.login-box label{display:block;font-size:0.85rem;color:#99aabb;margin-bottom:6px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:1rem;outline:none}
.login-box input:focus{border-color:#ff6b6b}
.login-box button{width:100%;padding:12px;margin-top:16px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff6b6b,#c0392b);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.login-box .field-group{display:flex;gap:10px}
.login-box .field-group input{flex:1}
.error-msg{color:#ff6b6b;font-size:0.85rem;margin-top:10px;text-align:center}
#mainScreen{display:none;padding-bottom:80px}
.header{background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);padding:16px 20px;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(255,255,255,0.06)}
.header .top-row{display:flex;justify-content:space-between;align-items:center}
.header .top-row h2{font-size:1rem;color:#ff6b6b}
.header .top-row .logout-btn{background:rgba(255,255,255,0.08);border:none;color:#99aabb;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem}
.header .group-info{margin-top:10px;font-size:1.1rem}
.header .group-info strong{color:#ff6b6b}
.exp-card{margin:16px 20px;background:linear-gradient(135deg,rgba(255,107,107,0.12),rgba(192,57,43,0.08));border:1px solid rgba(255,107,107,0.2);border-radius:14px;padding:20px;text-align:center}
.exp-card .exp-number{font-size:2.8rem;font-weight:700;color:#ff6b6b}
.exp-card .exp-label{font-size:0.8rem;color:#8899aa;margin-top:2px}
.exp-card .rank-badge{display:inline-block;margin-top:10px;padding:6px 20px;border-radius:20px;background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;font-weight:700;font-size:0.95rem}
.exp-card .next-rank{font-size:0.8rem;color:#8899aa;margin-top:8px}
.progress-wrap{margin:0 20px 16px;background:rgba(255,255,255,0.06);border-radius:10px;padding:12px 16px}
.progress-wrap .progress-label{display:flex;justify-content:space-between;font-size:0.8rem;color:#99aabb;margin-bottom:6px}
.progress-wrap .progress-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.progress-wrap .progress-bar .fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#c0392b);border-radius:4px;transition:width .5s ease}
.section-title{font-size:0.95rem;color:#ff6b6b;margin:20px 20px 10px;font-weight:600}
.section-title .count{font-size:0.75rem;color:#8899aa;font-weight:400}
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px}
@media(max-width:400px){.station-grid{grid-template-columns:1fr}}
.station-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.station-card.completed{border-color:rgba(0,200,100,0.3);background:rgba(0,200,100,0.06)}
.station-card .st-location{font-size:0.7rem;color:#667788;letter-spacing:1px}
.station-card .st-name{font-size:0.85rem;color:#ddeeff;margin:4px 0 2px;font-weight:500}
.station-card .st-exp{font-size:0.75rem;color:#8899aa}
.station-card .st-badge{position:absolute;top:8px;right:8px;font-size:0.7rem;padding:2px 10px;border-radius:10px}
.station-card .st-badge.done{background:rgba(0,200,100,0.2);color:#00c864}
.station-card .st-badge.pending{background:rgba(255,200,0,0.15);color:#ffc800}
.records-list{padding:0 20px}
.record-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem}
.record-item .r-exp{color:#ff6b6b;font-weight:600}
.record-item .r-time{color:#667788;font-size:0.75rem}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:10px;font-size:0.85rem;z-index:999;display:none;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.btn-pri{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.82rem}
.btn-sec{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.82rem}
.field{margin-bottom:10px}
.field label{display:block;font-size:.8rem;color:#8b949e;margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:.9rem;outline:none}
.field input:focus,.field select:focus{border-color:#ff6b6b}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal .st-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">
    <h1>🎨 Colour Your Life</h1>
    <p>萬鈞伯裘特工隊 · 勇闖五個世界</p>
  </div>
  <div class="login-box">
    <label>組別</label>
    <div class="field-group"><input type="text" id="groupIdInput" placeholder="例如：A1、B3" style="text-transform:uppercase;"></div>
    <label style="margin-top:12px;">密碼</label>
    <input type="password" id="passwordInput" placeholder="密碼">
    <button onclick="handleLogin()">🚀 進入系統</button>
    <div id="loginError" class="error-msg"></div>
    <div style="text-align:center;margin-top:16px;">
      <a href="javascript:void(0)" onclick="openLeaderboard()" style="color:#ffd700;font-size:.75rem;text-decoration:none;margin-right:12px;">🏆 排行榜</a>
      <a href="javascript:void(0)" onclick="openAdminModal()" style="color:#556677;font-size:.75rem;text-decoration:none;margin-right:12px;">📌 攤位管理</a>
      <a href="admin.html" style="color:#556677;font-size:.75rem;text-decoration:none;">⚙️ 管理後台</a>
    </div>
  </div>
</div>

<div id="mainScreen">
  <div class="header">
    <div class="top-row">
      <h2>🎨 特工檔案</h2>
      <div>
        <button class="logout-btn" onclick="refreshProfile()" style="margin-right:6px;" title="刷新">🔄</button>
        <button class="logout-btn" onclick="openLeaderboard()" style="margin-right:6px;">🏆</button>
        <button class="logout-btn" onclick="logout()">登出</button>
      </div>
    </div>
    <div class="group-info">組別：<strong id="dispGroup">—</strong></div>
  </div>
  <div class="exp-card">
    <div class="exp-number" id="dispExp">0</div>
    <div class="exp-label">總經驗值</div>
    <div class="rank-badge" id="dispRank">特工見習生</div>
    <div class="next-rank" id="dispNextRank"></div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label"><span id="progressLabel">晉升進度</span><span id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="section-title">📍 任務站點 <span class="count" id="stationCount"></span></div>
  <div id="stationContainer" class="station-grid"></div>
  <div class="section-title" style="margin-top:24px;">📜 活動記錄</div>
  <div id="recordsContainer" class="records-list"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="adminModal">
  <div class="modal" style="max-width:520px;">
    <div id="adminLoginForm">
      <h3 style="color:#ff6b6b;margin-bottom:16px;">🔐 攤位管理員登入</h3>
      <div class="field"><label>攤位編號</label><input type="text" id="adminStationId" placeholder="S01" style="text-transform:uppercase;"></div>
      <div class="field"><label>管理員密碼</label><input type="password" id="adminPwdModal" placeholder="密碼"></div>
      <button class="btn-pri" style="width:100%;margin-top:8px;" onclick="handleStationLogin()">登入</button>
      <div id="adminLoginErrModal" style="color:#f85149;font-size:.85rem;margin-top:8px;text-align:center;"></div>
    </div>
    <div id="adminStationPanel" style="display:none;"></div>
    <div class="modal-actions" style="justify-content:center;margin-top:12px;">
      <button class="btn-sec" onclick="closeAdminModal()">關閉</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="lbModal">
  <div class="modal" style="max-width:480px;">
    <h3 style="color:#ffd700;margin-bottom:16px;">🏆 即時排行榜</h3>
    <div id="lbBody" style="max-height:60vh;overflow-y:auto;"></div>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn-pri" onclick="refreshLeaderboard()">🔄 刷新</button>
      <button class="btn-sec" onclick="document.getElementById('lbModal').classList.remove('show')">關閉</button>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxoAeO3hLu6FXyKrm9abo8TcH-NEA5em3Nm_zkpia-4cmSTPW8adKPzeT4u1EXukOHU/exec';
var currentGroupId = null;
var rankThresholds = [0,150,300,450,600,750,900,1050,1200];
var rankTitles = ['特工見習生','特工助理','助理特工','特工','特工隊長','特工首席隊長','特工署助理署長','特工署副署長','特工署署長'];

var apiSeq = 0;
function api(action, params, callback) {
  if (!callback) { callback = params; params = null; }
  var cb = 'apiCB' + (++apiSeq);
  var url = API_URL + '?action=' + action + '&callback=' + cb;
  if (params) { for (var k in params) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }
  window[cb] = function(d) { delete window[cb]; callback(d); };
  var s = document.createElement('script');
  s.src = url;
  s.onload = function() { document.body.removeChild(s); }; // 清理 script tag
  s.onerror = function() { delete window[cb]; document.body.removeChild(s); callback({ success: false, message: '連線失敗' }); };
  document.body.appendChild(s);
  // 15秒 timeout 防卡死
  setTimeout(function() {
    if (window[cb]) { delete window[cb]; document.body.removeChild(s); callback({ success: false, message: '請求逾時' }); }
  }, 15000);
}

function showToast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 3000);
}

function handleLogin() {
  var gid = document.getElementById('groupIdInput').value.trim().toUpperCase();
  var pwd = document.getElementById('passwordInput').value.trim();
  if (!gid) { document.getElementById('loginError').textContent = '請輸入組別編號'; return; }
  if (!pwd) { document.getElementById('loginError').textContent = '請輸入密碼'; return; }
  document.getElementById('loginError').textContent = '載入中...';
  api('login', { groupId: gid, password: pwd }, function(res) {
    if (res.success) { currentGroupId = gid; loadProfile(); }
    else { document.getElementById('loginError').textContent = res.message; }
  });
}

function loadProfile() {
  document.getElementById('loginError').textContent = '載入中...';
  api('profile', { groupId: currentGroupId }, function(profile) {
    if (profile && profile.success) {
      renderProfile(profile);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'block';
    } else { document.getElementById('loginError').textContent = '載入失敗：' + (profile ? profile.message : '無法取得資料'); }
  });
}

function refreshProfile() {
  showToast('🔄 更新中...');
  api('profile', { groupId: currentGroupId }, function(profile) {
    if (profile && profile.success) { renderProfile(profile); showToast('✅ 已更新！'); }
    else { showToast('更新失敗：' + (profile ? profile.message : '無法取得資料')); }
  });
}

function renderProfile(p) {
  document.getElementById('dispGroup').textContent = p.groupId;
  document.getElementById('dispExp').textContent = p.totalExp;
  document.getElementById('dispRank').textContent = p.rank;
  if (p.nextRank && p.nextRankThreshold) {
    document.getElementById('dispNextRank').textContent = '下階級：' + p.nextRank + '（' + p.nextRankThreshold + ' EXP）';
  } else { document.getElementById('dispNextRank').textContent = '🏆 已達最高階級！'; }
  var idx = rankTitles.indexOf(p.rank);
  var currentThreshold = idx >= 0 ? rankThresholds[idx] : 0;
  if (p.nextRankThreshold) {
    var range = p.nextRankThreshold - currentThreshold;
    var progress = p.totalExp - currentThreshold;
    var pct = Math.min(100, Math.max(0, (progress / range) * 100));
    document.getElementById('progressLabel').textContent = p.rank + ' → ' + p.nextRank;
    document.getElementById('progressPct').textContent = Math.round(pct) + '%';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressWrap').style.display = 'block';
  } else { document.getElementById('progressWrap').style.display = 'none'; }
  renderStations(p.stations);
  renderRecords(p.records);
}

function renderStations(stations) {
  var container = document.getElementById('stationContainer');
  var done = 0, html = '';
  stations.forEach(function(s) {
    if (s.completed) done++;
    html += '<div class="station-card' + (s.completed ? ' completed' : '') + '">';
    html += '<div class="st-location">' + (s.location || '') + '</div>';
    html += '<div class="st-name">' + s.name + '</div>';
    html += '<div class="st-exp">+' + s.exp + ' EXP</div>';
    html += '<div class="st-badge ' + (s.completed ? 'done' : 'pending') + '">' + (s.completed ? '✓ 已完成' : '待完成') + '</div></div>';
  });
  container.innerHTML = html;
  document.getElementById('stationCount').textContent = done + ' / ' + stations.length + ' 已完成';
}

function renderRecords(records) {
  var container = document.getElementById('recordsContainer');
  if (!records || records.length === 0) {
    container.innerHTML = '<div style="color:#667788;padding:10px 0;font-size:.85rem;">尚無活動記錄</div>'; return;
  }
  var html = '';
  records.slice(-20).reverse().forEach(function(r) {
    html += '<div class="record-item">';
    html += '<div><span style="color:#aabbcc;">' + (r.stationId || '') + '</span><br><span class="r-time">' + (r.time || '') + '</span></div>';
    html += '<div class="r-exp">+' + r.exp + '</div></div>';
  });
  container.innerHTML = html;
}

function logout() {
  currentGroupId = null;
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('groupIdInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').textContent = '';
}

function openLeaderboard() {
  document.getElementById('lbModal').classList.add('show');
  refreshLeaderboard();
}

function refreshLeaderboard() {
  var body = document.getElementById('lbBody');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:#8b949e;">載入中...</div>';
  api('leaderboard', function(list) {
    if (!list || list.length === 0) { body.innerHTML = '<div style="text-align:center;padding:20px;color:#8b949e;">暫無數據</div>'; return; }
    var medals = ['🥇','🥈','🥉'];
    var html = '<table style="width:100%;border-collapse:collapse;font-size:.85rem;"><thead><tr><th style="text-align:center;padding:8px;color:#8b949e;">#</th><th style="text-align:left;padding:8px;color:#8b949e;">組別</th><th style="text-align:right;padding:8px;color:#8b949e;">EXP</th><th style="text-align:right;padding:8px;color:#8b949e;">階級</th></tr></thead><tbody>';
    list.forEach(function(g, i) {
      var r = i < 3 ? medals[i] : (i + 1);
      var isCur = currentGroupId && g.groupId.toUpperCase() === currentGroupId.toUpperCase();
      html += '<tr' + (isCur ? ' style="background:rgba(255,107,107,0.08);"' : '') + '>';
      html += '<td style="text-align:center;padding:8px;font-weight:600;">' + r + '</td>';
      html += '<td style="padding:8px;' + (isCur ? 'color:#ff6b6b;font-weight:600;' : '') + '">' + escHtml(g.groupId) + '</td>';
      html += '<td style="text-align:right;padding:8px;font-weight:600;">' + g.totalExp + '</td>';
      html += '<td style="text-align:right;padding:8px;color:#8b949e;">' + g.rank + '</td></tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  });
}

// Station admin modal
function openAdminModal() {
  document.getElementById('adminLoginErrModal').textContent = '';
  document.getElementById('adminLoginForm').style.display = 'block';
  document.getElementById('adminStationPanel').style.display = 'none';
  document.getElementById('adminStationPanel').innerHTML = '';
  document.getElementById('adminStationId').value = '';
  document.getElementById('adminPwdModal').value = '';
  document.getElementById('adminModal').classList.add('show');
}
function closeAdminModal() { document.getElementById('adminModal').classList.remove('show'); }
function handleStationLogin() {
  var sid = document.getElementById('adminStationId').value.trim().toUpperCase();
  var pwd = document.getElementById('adminPwdModal').value.trim();
  if (!sid) { document.getElementById('adminLoginErrModal').textContent = '請輸入攤位編號'; return; }
  document.getElementById('adminLoginErrModal').textContent = '驗證中...';
  api('loginStation', { stationId: sid, password: pwd }, function(res) {
    if (res.success) {
      document.getElementById('adminLoginForm').style.display = 'none';
      var panel = document.getElementById('adminStationPanel');
      panel.style.display = 'block';
      panel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
        + '<div><h3 style="color:#ff6b6b;margin:0;">📌 ' + escHtml(res.station.stationId) + '</h3>'
        + '<div style="font-size:.8rem;color:#8b949e;">' + escHtml(res.station.name) + ' <span style="color:#3fb950;">(+' + res.station.exp + ' EXP)</span></div></div>'
        + '<button class="btn-sec" onclick="openAdminModal()" style="font-size:.75rem;">🔁 換攤位</button></div>'
        + '<div id="stationGroupList" style="max-height:55vh;overflow-y:auto;"><div style="text-align:center;color:#8b949e;padding:20px;">載入中...</div></div>';
      loadPendingGroups(res.station.stationId);
    } else {
      document.getElementById('adminLoginErrModal').textContent = res.message;
    }
  });
}
function loadPendingGroups(sid) {
  api('pendingGroups', { stationId: sid }, function(groups) {
    var list = document.getElementById('stationGroupList');
    if (!list) return;
    if (!groups || groups.length === 0) { list.innerHTML = '<div style="text-align:center;padding:30px;color:#3fb950;font-size:1rem;">✅ 所有組別已完成此攤位！</div>'; return; }
    var html = '<div style="margin-bottom:8px;font-size:.82rem;color:#8b949e;">尚有 <strong style="color:#f0f6fc;">' + groups.length + '</strong> 組未完成</div>';
    groups.forEach(function(g) {
      html += '<div class="st-item">';
      html += '<div><strong style="font-size:1rem;">' + escHtml(g.groupId) + '</strong><br><span style="font-size:.75rem;color:#8b949e;">EXP: ' + g.totalExp + '</span></div>';
      html += '<button class="btn-pri" onclick="completeStation(\'' + g.groupId + '\',\'' + sid + '\')" style="padding:8px 20px;font-size:.85rem;">+完成</button></div>';
    });
    list.innerHTML = html;
  });
}
function completeStation(groupId, sid) {
  api('addExp', { groupId: groupId, stationId: sid, admin: 'admin' }, function(res) { showToast(res.message); loadPendingGroups(sid); });
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('passwordInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
});
</script>
</body>
</html>
